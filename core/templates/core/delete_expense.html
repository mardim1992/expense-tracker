<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Delete Expense</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
      margin: 0;
      padding: 0;
      color: #222;
    }

    .container {
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
      color: #1f3b57;
      font-size: 38px;
    }

    .top-links {
      margin-bottom: 20px;
    }

    .top-links a {
      display: inline-block;
      padding: 10px 14px;
      background-color: #ffffff;
      border: 1px solid #dcdcdc;
      border-radius: 10px;
      text-decoration: none;
      color: #222;
      font-weight: bold;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
      transition: 0.2s ease;
    }

    .top-links a:hover {
      background-color: #eef3f8;
      transform: translateY(-2px);
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    .warning {
      margin-bottom: 15px;
      font-size: 18px;
      color: #c62828;
      font-weight: bold;
    }

    .details {
      background: #fff5f5;
      border: 1px solid #f5c2c2;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      list-style: none;
    }

    .details li {
      margin-bottom: 8px;
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    .delete-btn {
      padding: 10px 16px;
      border-radius: 10px;
      background: #e53935;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .delete-btn:hover {
      background: #c62828;
    }

    .cancel-btn {
      padding: 10px 16px;
      border-radius: 10px;
      background: #eeeeee;
      color: #222;
      text-decoration: none;
      font-weight: bold;
      border: 1px solid #ccc;
    }

    .cancel-btn:hover {
      background: #e0e0e0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Delete Expense</h1>

    <div class="top-links">
      <a href="{% url 'history' %}">← Back to History</a>
    </div>

    <div class="card">
      <p class="warning">⚠ Are you sure you want to delete this expense?</p>

      <ul class="details">
        <li><strong>Date:</strong> {{ expense.date }}</li>
        <li><strong>Category:</strong> {{ expense.get_category_display }}</li>
        <li><strong>Amount:</strong> {{ expense.amount }} €</li>
        <li><strong>Description:</strong> {{ expense.description }}</li>
      </ul>

      <form method="post" class="actions">
        {% csrf_token %}
        <button type="submit" class="delete-btn">Yes, Delete</button>
        <a href="{% url 'history' %}" class="cancel-btn">Cancel</a>
      </form>
    </div>
  </div>
</body>
</html>
